<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuantumFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #020408;
    --panel: rgba(5, 15, 30, 0.92);
    --border: rgba(0, 200, 255, 0.15);
    --cyan: #00c8ff;
    --cyan-dim: rgba(0, 200, 255, 0.5);
    --orange: #ff6a00;
    --purple: #bf00ff;
    --white: #e8f4ff;
    --muted: rgba(232, 244, 255, 0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Exo 2', sans-serif;
    height: 100vh;
    overflow: hidden;
    cursor: crosshair;
  }

  /* ── HEADER ── */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 2rem;
    background: rgba(2, 4, 8, 0.85);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(20px);
  }

  .logo {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 1.4rem;
    letter-spacing: 0.15em;
    color: var(--cyan);
    text-shadow: 0 0 20px var(--cyan-dim);
  }

  .logo span { color: var(--white); }

  /* ── MODE TABS ── */
  .tabs {
    display: flex;
    gap: 0.5rem;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 0.3rem;
  }

  .tab {
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    padding: 0.5rem 1.1rem;
    border-radius: 50px;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.3s ease;
    white-space: nowrap;
  }

  .tab:hover { color: var(--white); }

  .tab.active {
    background: var(--cyan);
    color: #000;
    font-weight: 700;
    box-shadow: 0 0 15px var(--cyan-dim);
  }

  .tab.active.orange { background: var(--orange); box-shadow: 0 0 15px rgba(255,106,0,0.5); }
  .tab.active.purple { background: var(--purple); box-shadow: 0 0 15px rgba(191,0,255,0.5); }

  /* ── CANVAS ── */
  canvas {
    display: block;
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* ── HUD PANEL ── */
  .hud {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 2rem;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 1rem 2rem;
    backdrop-filter: blur(30px);
    box-shadow: 0 0 40px rgba(0,200,255,0.05);
  }

  .hud-stat {
    text-align: center;
    min-width: 60px;
  }

  .hud-num {
    font-family: 'Orbitron', monospace;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--cyan);
    text-shadow: 0 0 10px var(--cyan-dim);
    line-height: 1;
  }

  .hud-num.orange { color: var(--orange); text-shadow: 0 0 10px rgba(255,106,0,0.5); }
  .hud-num.purple { color: var(--purple); text-shadow: 0 0 10px rgba(191,0,255,0.5); }

  .hud-label {
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 0.2rem;
  }

  .hud-divider {
    width: 1px; height: 36px;
    background: var(--border);
  }

  /* ── HINT ── */
  .hint {
    position: fixed;
    top: 5.5rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    background: rgba(0,0,0,0.5);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 0.4rem 1.2rem;
    pointer-events: none;
    transition: opacity 0.5s;
  }

  /* ── SLIDER CONTROL ── */
  .controls {
    position: fixed;
    right: 1.5rem;
    top: 50%;
    transform: translateY(-50%);
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.2rem 0.9rem;
    backdrop-filter: blur(20px);
  }

  .ctrl-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
  }

  .ctrl-label {
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
  }

  input[type=range] {
    -webkit-appearance: none;
    writing-mode: vertical-lr;
    direction: rtl;
    width: 4px;
    height: 80px;
    background: rgba(0,200,255,0.15);
    border-radius: 4px;
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 8px var(--cyan-dim);
    cursor: pointer;
  }

  .ctrl-val {
    font-family: 'Orbitron', monospace;
    font-size: 0.6rem;
    color: var(--cyan);
  }

  /* mode transition overlay */
  #overlay {
    position: fixed;
    inset: 0;
    background: #000;
    opacity: 0;
    pointer-events: none;
    z-index: 50;
    transition: opacity 0.3s;
  }
</style>
</head>
<body>

<div id="overlay"></div>
<canvas id="c"></canvas>

<!-- HEADER -->
<header>
  <div class="logo">Quantum<span>Flow</span></div>
  <div class="tabs">
    <button class="tab active" data-mode="gravity" onclick="switchMode('gravity',this)">🌍 Gravitasi</button>
    <button class="tab" data-mode="explosion" onclick="switchMode('explosion',this)">💥 Ledakan</button>
    <button class="tab" data-mode="blackhole" onclick="switchMode('blackhole',this)">🕳️ Black Hole</button>
  </div>
  <div style="font-size:0.7rem; color:var(--muted); letter-spacing:0.1em; font-family:'Orbitron',monospace;">v1.0</div>
</header>

<!-- HINT -->
<div class="hint" id="hint">🖱️ Klik & geser untuk berinteraksi</div>

<!-- RIGHT CONTROLS -->
<div class="controls">
  <div class="ctrl-item">
    <div class="ctrl-label">Jumlah</div>
    <input type="range" id="countSlider" min="20" max="300" value="100" oninput="updateCount(this.value)">
    <div class="ctrl-val" id="countVal">100</div>
  </div>
  <div class="ctrl-item">
    <div class="ctrl-label">Kecepatan</div>
    <input type="range" id="speedSlider" min="1" max="10" value="4" oninput="updateSpeed(this.value)">
    <div class="ctrl-val" id="speedVal">4</div>
  </div>
  <div class="ctrl-item">
    <div class="ctrl-label">Ukuran</div>
    <input type="range" id="sizeSlider" min="1" max="8" value="3" oninput="updateSize(this.value)">
    <div class="ctrl-val" id="sizeVal">3</div>
  </div>
</div>

<!-- BOTTOM HUD -->
<div class="hud">
  <div class="hud-stat">
    <div class="hud-num" id="hudParticles">0</div>
    <div class="hud-label">Partikel</div>
  </div>
  <div class="hud-divider"></div>
  <div class="hud-stat">
    <div class="hud-num" id="hudFps">0</div>
    <div class="hud-label">FPS</div>
  </div>
  <div class="hud-divider"></div>
  <div class="hud-stat">
    <div class="hud-num" id="hudMode">GRV</div>
    <div class="hud-label">Mode</div>
  </div>
  <div class="hud-divider"></div>
  <div class="hud-stat">
    <div class="hud-num" id="hudClicks">0</div>
    <div class="hud-label">Interaksi</div>
  </div>
</div>

<script>
// ─────────────────────────────────────────
//  QuantumFlow — Physics Particle Engine
// ─────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── State ──
let mode       = 'gravity';
let particles  = [];
let maxCount   = 100;
let speedMult  = 4;
let sizeMult   = 3;
let mouse      = { x: W/2, y: H/2, down: false };
let clicks     = 0;
let frameCount = 0;
let fps        = 0;
let lastFPS    = performance.now();
let raf;

// ── Colors per mode ──
const modeColor = {
  gravity:   { r:0,   g:200, b:255 },
  explosion: { r:255, g:106, b:0   },
  blackhole: { r:191, g:0,   b:255 },
};

// ─────────────────────────────────────────
//  PARTICLE CLASS
// ─────────────────────────────────────────
class Particle {
  constructor(x, y, burst) {
    this.x  = x  ?? Math.random() * W;
    this.y  = y  ?? Math.random() * H;

    const speed = (burst ?? (Math.random() * 1.5 + 0.2)) * (speedMult / 4);
    const angle = Math.random() * Math.PI * 2;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;

    this.mass   = Math.random() * 2 + 0.5;
    this.radius = (Math.random() * 2 + 1) * (sizeMult / 3);
    this.life   = 1;
    this.decay  = burst ? 0.012 + Math.random() * 0.015 : 0;

    const c = modeColor[mode];
    const t = Math.random();
    this.r  = Math.round(c.r * t + 255 * (1-t));
    this.g  = Math.round(c.g * t);
    this.b  = Math.round(c.b * t + 255 * (1-t) * 0.3);
    this.alpha = 1;
  }

  update() {
    if (mode === 'gravity')   this.updateGravity();
    if (mode === 'explosion') this.updateExplosion();
    if (mode === 'blackhole') this.updateBlackhole();

    this.x += this.vx;
    this.y += this.vy;

    if (this.decay) {
      this.life -= this.decay;
      this.alpha = this.life;
    }

    // bounce walls (gravity & blackhole)
    if (mode !== 'explosion') {
      if (this.x < this.radius)  { this.x = this.radius;  this.vx *= -0.7; }
      if (this.x > W-this.radius){ this.x = W-this.radius; this.vx *= -0.7; }
      if (this.y < this.radius)  { this.y = this.radius;  this.vy *= -0.7; }
      if (this.y > H-this.radius){ this.y = H-this.radius; this.vy *= -0.7; }
    }

    // damping
    this.vx *= 0.995;
    this.vy *= 0.995;
  }

  updateGravity() {
    // Attract toward mouse if held
    if (mouse.down) {
      const dx = mouse.x - this.x;
      const dy = mouse.y - this.y;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      const force = Math.min(200 / (dist * dist), 2);
      this.vx += (dx/dist) * force * this.mass * 0.05;
      this.vy += (dy/dist) * force * this.mass * 0.05;
    }

    // Gravity between particles (N-body, sampled)
    const G = 0.4;
    for (let i = 0; i < particles.length; i += 3) {
      const o = particles[i];
      if (o === this) continue;
      const dx = o.x - this.x;
      const dy = o.y - this.y;
      const d2 = dx*dx + dy*dy;
      if (d2 < 1 || d2 > 90000) continue;
      const f = G * this.mass * o.mass / d2;
      const d = Math.sqrt(d2);
      this.vx += (dx/d) * f;
      this.vy += (dy/d) * f;
    }
  }

  updateExplosion() {
    // burst particles fade out; others drift
    this.vy += 0.05; // subtle gravity
  }

  updateBlackhole() {
    // Black hole at mouse position
    const dx = mouse.x - this.x;
    const dy = mouse.y - this.y;
    const dist = Math.sqrt(dx*dx + dy*dy) || 1;

    if (dist < 30) {
      // absorbed
      this.life = 0;
      return;
    }

    const force = 6000 / (dist * dist);
    this.vx += (dx/dist) * force * 0.015;
    this.vy += (dy/dist) * force * 0.015;

    // swirl tangent
    this.vx += (-dy/dist) * 0.4;
    this.vy += ( dx/dist) * 0.4;

    // speed cap
    const spd = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
    if (spd > 12) { this.vx = this.vx/spd*12; this.vy = this.vy/spd*12; }

    // fade near center
    if (dist < 80) this.alpha = dist / 80;
  }

  draw() {
    const c = modeColor[mode];
    ctx.save();
    ctx.globalAlpha = Math.max(0, Math.min(1, this.alpha));

    // glow
    const grd = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius * 3);
    grd.addColorStop(0, `rgba(${this.r},${this.g},${this.b},0.8)`);
    grd.addColorStop(1, `rgba(${this.r},${this.g},${this.b},0)`);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius * 3, 0, Math.PI*2);
    ctx.fillStyle = grd;
    ctx.fill();

    // core
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
    ctx.fillStyle = `rgb(${this.r},${this.g},${this.b})`;
    ctx.fill();

    ctx.restore();
  }

  get dead() { return this.life <= 0; }
}

// ─────────────────────────────────────────
//  GRAVITY: draw connection lines
// ─────────────────────────────────────────
function drawConnections() {
  const maxDist = 100;
  for (let i = 0; i < particles.length; i++) {
    for (let j = i+1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const d  = Math.sqrt(dx*dx + dy*dy);
      if (d < maxDist) {
        const alpha = (1 - d/maxDist) * 0.25;
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `rgba(0,200,255,${alpha})`;
        ctx.lineWidth   = 0.5;
        ctx.stroke();
      }
    }
  }
}

// ─────────────────────────────────────────
//  BLACK HOLE: draw the singularity
// ─────────────────────────────────────────
function drawBlackhole() {
  const x = mouse.x, y = mouse.y;

  // accretion disk rings
  for (let r = 60; r <= 120; r += 20) {
    const alpha = (1 - (r-60)/80) * 0.15;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(191,0,255,${alpha})`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // event horizon
  const g = ctx.createRadialGradient(x, y, 0, x, y, 55);
  g.addColorStop(0,   'rgba(0,0,0,1)');
  g.addColorStop(0.7, 'rgba(80,0,120,0.6)');
  g.addColorStop(1,   'rgba(191,0,255,0)');
  ctx.beginPath();
  ctx.arc(x, y, 55, 0, Math.PI*2);
  ctx.fillStyle = g;
  ctx.fill();
}

// ─────────────────────────────────────────
//  EXPLOSION: burst on click
// ─────────────────────────────────────────
function spawnExplosion(x, y) {
  const count = 60 + Math.floor(Math.random() * 40);
  for (let i = 0; i < count; i++) {
    const speed = Math.random() * 6 + 1;
    const p = new Particle(x, y, speed);
    p.radius = (Math.random() * 3 + 1) * (sizeMult/3);
    particles.push(p);
  }
}

// ─────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────
function initParticles() {
  particles = [];
  for (let i = 0; i < maxCount; i++) {
    particles.push(new Particle());
  }
}

// ─────────────────────────────────────────
//  MAIN LOOP
// ─────────────────────────────────────────
function loop(now) {
  raf = requestAnimationFrame(loop);

  // FPS
  frameCount++;
  if (now - lastFPS >= 500) {
    fps = Math.round(frameCount / ((now - lastFPS) / 1000));
    frameCount = 0;
    lastFPS = now;
    document.getElementById('hudFps').textContent = fps;
  }

  // Background trail
  ctx.fillStyle = mode === 'blackhole'
    ? 'rgba(2,0,8,0.25)'
    : 'rgba(2,4,8,0.2)';
  ctx.fillRect(0, 0, W, H);

  // Mode-specific bg elements
  if (mode === 'blackhole') drawBlackhole();

  // Connections for gravity
  if (mode === 'gravity') drawConnections();

  // Update & draw
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.update();
    if (p.dead) {
      particles.splice(i, 1);
      continue;
    }
    p.draw();
  }

  // Replenish ambient particles
  if (mode !== 'explosion') {
    while (particles.length < maxCount) {
      particles.push(new Particle());
    }
  }

  // HUD
  document.getElementById('hudParticles').textContent = particles.length;
}

// ─────────────────────────────────────────
//  INPUT
// ─────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

canvas.addEventListener('mousedown', e => {
  mouse.down = true;
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  clicks++;
  document.getElementById('hudClicks').textContent = clicks;

  if (mode === 'explosion') {
    spawnExplosion(e.clientX, e.clientY);
  }
});

canvas.addEventListener('mouseup', () => mouse.down = false);

// Touch support
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
}, { passive: false });

canvas.addEventListener('touchstart', e => {
  mouse.down = true;
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
  clicks++;
  document.getElementById('hudClicks').textContent = clicks;
  if (mode === 'explosion') spawnExplosion(mouse.x, mouse.y);
});

canvas.addEventListener('touchend', () => mouse.down = false);

// ─────────────────────────────────────────
//  MODE SWITCH
// ─────────────────────────────────────────
const modeLabel = { gravity:'GRV', explosion:'EXP', blackhole:'BLK' };
const modeHints = {
  gravity:   '🖱️ Tahan klik untuk menarik partikel — gravitasi N-Body aktif',
  explosion: '🖱️ Klik di mana saja untuk meledakkan partikel!',
  blackhole: '🖱️ Gerakkan kursor — black hole menyedot semua partikel',
};

function switchMode(m, btn) {
  const overlay = document.getElementById('overlay');
  overlay.style.opacity = '1';

  setTimeout(() => {
    mode = m;
    cancelAnimationFrame(raf);
    ctx.clearRect(0, 0, W, H);
    initParticles();

    // Update tabs
    document.querySelectorAll('.tab').forEach(t => {
      t.classList.remove('active','orange','purple');
    });
    btn.classList.add('active');
    if (m === 'explosion') btn.classList.add('orange');
    if (m === 'blackhole') btn.classList.add('purple');

    // HUD accent
    const num = document.getElementById('hudMode');
    num.textContent = modeLabel[m];
    num.className   = 'hud-num' + (m==='explosion'?' orange': m==='blackhole'?' purple':'');

    document.getElementById('hint').textContent = modeHints[m];

    overlay.style.opacity = '0';
    loop(performance.now());
  }, 300);
}

// ─────────────────────────────────────────
//  CONTROLS
// ─────────────────────────────────────────
function updateCount(v) {
  maxCount = parseInt(v);
  document.getElementById('countVal').textContent = v;
  while (particles.length > maxCount) particles.pop();
}

function updateSpeed(v) {
  speedMult = parseInt(v);
  document.getElementById('speedVal').textContent = v;
}

function updateSize(v) {
  sizeMult = parseInt(v);
  document.getElementById('sizeVal').textContent = v;
  particles.forEach(p => p.radius = (Math.random()*2+1)*(sizeMult/3));
}

// ─────────────────────────────────────────
//  START
// ─────────────────────────────────────────
initParticles();
loop(performance.now());

// Hide hint after 5s
setTimeout(() => {
  document.getElementById('hint').style.opacity = '0';
}, 5000);
</script>
</body>
</html>
